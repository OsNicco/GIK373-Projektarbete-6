<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Random Webbplats</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px;
    }

    h1 {
      font-size: 50px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      width: 300px;
      margin: 30px auto;
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(5px);
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: white;
      color: black;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: lightgray;
    }

    #text {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Min Random Webbplats</h1>
    <p>Test sida med HTML, CSS och JavaScript</p>
  </header>

  <div class="card">
    <h2>Klicka på knappen</h2>
    <button onclick="showMessage()">Tryck här</button>

    <p id="text"></p>
  </div>

  <script>
    function showMessage() {
      const messages = [
        "Hej världen 🌍",
        "JavaScript fungerar 🔥",
        "Du klickade på knappen 😎",
        "Visual Studio Code är nice 💻",
        "Random meddelande 🎲"
      ];

      const random =
        messages[Math.floor(Math.random() * messages.length)];

      document.getElementById("text").innerText = random;
    }
  </script>

</body>
</html>
